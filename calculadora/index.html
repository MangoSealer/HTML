<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="/calculadora/style.css">
    <link rel="stylesheet" href="../style/fonte_bonitinha.css">

</head>

<script>


    let conta = '';

</script>


<body>

    <h1 class="display">Só funciona no console, burro</h1>




    <!-- números -->
    <div class="linha">
        <button onclick="conta+='1'; console.log(conta)" class="numeros 1">1</button>
        <button onclick="conta+='2'; console.log(conta)" class="numeros 2">2</button>
        <button onclick="conta+='3'; console.log(conta)" class="numeros 3">3</button>
        <button onclick="conta+='+'; console.log(conta)" class="operador numeros soma">+</button>

    </div>

    <div class="linha">
        <button onclick="conta+='4'; console.log(conta)" class="numeros 4">4</button>
        <button onclick="conta+='5'; console.log(conta)" class="numeros 5">5</button>
        <button onclick="conta+='6'; console.log(conta)" class="numeros 6">6</button>
        <button onclick="conta+='-'; console.log(conta)" class="operador numeros subtracao">-</button>
    </div>

    <div class="linha">
        <button onclick="conta+='7'; console.log(conta)" class="numeros 7">7</button>
        <button onclick="conta+='8'; console.log(conta)" class="numeros 8">8</button>
        <button onclick="conta+='9'; console.log(conta)" class="numeros 9">9</button>
        <button onclick="conta+='/'; console.log(conta)" class="operador numeros divisao">/</button>
    </div>

    <div class="linha0">
        <button onclick="conta+='0'; console.log(conta)" class="numeros ">0</button>
        <button onclick="conta+='.'; console.log(conta)" class="numeros ponto">.</button>
        <button onclick="conta = eval(conta); console.log(conta); conta=''"; class=" numeros igual">=</button>
        <button onclick="conta+='*'; console.log(conta)" class=" operador numeros multiplicacao">*</button>
    </div>


    <div class="clear">
        <button class="limpar" onclick="conta = ''; console.clear();">Clear</button>
    </div>

</body>





</html>
