<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB</title>
  <link rel="stylesheet" href="../style/epub_reader.css">
  <link rel="icon" href="../assets/seasky.ico">
  <script src="/auth.js"></script>
</head>

<body>

  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>EPUBs</h1>
      <button class="btn btn-primary" onclick="toggleUpload()">+ Upload</button>
    </div>

    <div class="sidebar-tabs">
      <button class="sidebar-tab active" id="tab-books" onclick="showTab('books')">Livros</button>
      <button class="sidebar-tab" id="tab-toc" onclick="showTab('toc')">Índice</button>
      <button class="sidebar-tab" id="tab-bookmarks" onclick="showTab('bookmarks')">Marcadores</button>
    </div>

    <div id="upload-zone">
      <div class="drop-area" id="drop-area" onclick="document.getElementById('file-input').click()">
        <span>📖</span>
        Arraste um EPUB ou clique para selecionar
      </div>
      <input type="file" id="file-input" accept=".epub" hidden onchange="handleFileSelect(event)">
    </div>

    <div id="epub-list" class="tab-content"></div>

    <div id="toc-list" class="tab-content hidden">
      <div id="toc-empty" class="empty-list">Abra um livro para ver o índice.</div>
      <div id="toc-items"></div>
    </div>

    <div id="bookmarks-content" class="tab-content hidden">
      <div id="bookmarks-empty" class="empty-list">Abra um livro para ver os marcadores.</div>
      <div id="bookmarks-list"></div>
    </div>
  </aside>

  <div id="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <main id="reader">
    <button id="btn-toggle-bar" class="btn btn-ghost btn-icon" onclick="toggleReaderBar()" title="Esconder barra">▲</button>

    <div id="reader-empty">Selecione um EPUB na lista</div>

    <div id="reader-content" class="hidden">
      <div class="reader-bar">
        <button class="btn btn-ghost btn-icon" id="btn-toggle-sidebar" onclick="toggleSidebar()" title="Esconder painel">◀</button>
        <button class="btn btn-ghost btn-icon" onclick="closeBook()" title="Fechar livro">✕</button>
        <div class="bar-sep"></div>

        <div class="reader-bar-group">
          <button class="btn btn-ghost btn-icon" id="btn-prev" onclick="changePage(-1)" title="Anterior">&#8592;</button>
          <span class="reader-info" id="reader-info">—</span>
          <button class="btn btn-ghost btn-icon" id="btn-next" onclick="changePage(1)" title="Próximo">&#8594;</button>
        </div>

        <div class="reader-bar-group">
          <button class="btn btn-ghost btn-icon" onclick="changeFontSize(-10)" title="Diminuir fonte">A&#8722;</button>
          <span id="font-label" class="reader-info" style="min-width:42px;text-align:center;">100%</span>
          <button class="btn btn-ghost btn-icon" onclick="changeFontSize(10)" title="Aumentar fonte">A&#43;</button>
        </div>

        <div class="reader-bar-group">
          <button class="btn btn-ghost btn-icon" id="btn-bookmark" onclick="toggleBookmark()" title="Marcar posição">🔖</button>
        </div>

        <div class="reader-bar-group">
          <button class="theme-btn" data-theme="white" onclick="setTheme('white')" title="Claro"></button>
          <button class="theme-btn" data-theme="sepia" onclick="setTheme('sepia')" title="Sépia"></button>
          <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')" title="Escuro"></button>
        </div>
      </div>

      <div id="viewer-loading" class="hidden">Carregando EPUB…</div>
      <div id="viewer-wrap">
        <div id="epub-viewer"></div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  <script src="../scripts/epub_reader.js"></script>
</body>

</html>
