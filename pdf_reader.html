<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #263244;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --warning: #f59e0b;
      --success: #22c55e;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    #upload-zone {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    #upload-zone.open {
      max-height: 140px;
    }

    .drop-area {
      margin: 12px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 13px;
    }

    .drop-area:hover,
    .drop-area.drag-over {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.06);
      color: var(--text);
    }

    .drop-area span {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    #pdf-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    #pdf-list::-webkit-scrollbar {
      width: 5px;
    }

    #pdf-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #pdf-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .pdf-item {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .pdf-item:hover {
      border-color: #3d5275;
    }

    .pdf-item.active {
      border-color: var(--primary);
    }

    .pdf-item-body {
      padding: 10px 12px 8px;
      cursor: pointer;
    }

    .pdf-item-title {
      font-weight: 500;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .pdf-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .page-badge {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 5px;
      padding: 0 5px;
      font-size: 11px;
      font-weight: 500;
    }

    .pdf-item-actions {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .item-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s;
    }

    .item-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .item-btn.del:hover {
      background: rgba(220, 38, 38, 0.1);
      color: #fca5a5;
    }

    .item-btn+.item-btn {
      border-left: 1px solid var(--border);
    }

    .rename-input {
      width: 100%;
      background: #0b1220;
      border: 1px solid var(--primary);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 7px;
      font-size: 13px;
      outline: none;
    }

    .empty-list {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 32px 16px;
    }

    /* ── Reader ── */
    #reader {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reader-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .reader-bar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-info {
      color: var(--muted);
      font-size: 13px;
      min-width: 70px;
    }

    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      background: #080e1a;
    }

    #canvas-wrap::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    #canvas-wrap::-webkit-scrollbar-track {
      background: #080e1a;
    }

    #canvas-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    #pdf-canvas {
      display: block;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
      max-width: 100%;
    }

    #reader-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
    }

    #reader-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:not(:disabled):hover {
      background: var(--primary-hover);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:not(:disabled):hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-icon {
      padding: 6px 9px;
    }

    .page-input {
      width: 52px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .page-input:focus {
      border-color: var(--primary);
    }

    /* ── Error banner ── */
    #error-banner {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.92);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 999;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: opacity 0.3s;
    }

    /* ── Loading overlay on canvas ── */
    #canvas-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      background: #080e1a;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 42vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .reader-bar {
        gap: 6px;
      }
    }
  </style>
</head>

<body>

  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>PDFs</h1>
      <button class="btn btn-primary" onclick="toggleUpload()">+ Upload</button>
    </div>

    <div id="upload-zone">
      <div class="drop-area" id="drop-area" onclick="document.getElementById('file-input').click()">
        <span>📄</span>
        Arraste um PDF ou clique para selecionar
      </div>
      <input type="file" id="file-input" accept=".pdf" hidden onchange="handleFileSelect(event)">
    </div>

    <div id="pdf-list"></div>
  </aside>

  <main id="reader">
    <div id="reader-empty">Selecione um PDF na lista</div>

    <div id="reader-content" class="hidden">
      <div class="reader-bar">
        <div class="reader-bar-group">
          <button class="btn btn-ghost btn-icon" id="btn-prev" onclick="changePage(-1)"
            title="Página anterior">&#8592;</button>
          <input type="number" id="page-input" class="page-input" min="1" onkeydown="handlePageKey(event)"
            onblur="handlePageBlur()">
          <span class="page-info" id="page-info">de —</span>
          <button class="btn btn-ghost btn-icon" id="btn-next" onclick="changePage(1)"
            title="Próxima página">&#8594;</button>
        </div>
        <div class="reader-bar-group">
          <button class="btn btn-ghost btn-icon" onclick="changeZoom(-0.2)" title="Diminuir zoom">&#8722;</button>
          <span id="zoom-label" class="page-info" style="min-width:42px;text-align:center;">120%</span>
          <button class="btn btn-ghost btn-icon" onclick="changeZoom(0.2)" title="Aumentar zoom">&#43;</button>
        </div>
      </div>

      <div id="canvas-loading" class="hidden">Carregando PDF…</div>
      <div id="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    'use strict';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const BASE = 'https://painel.danilosn.work';

    const S = {
      pdfs: [],
      filename: null,
      doc: null,
      page: 1,
      total: 0,
      scale: 1.2,
      renderTask: null,
      saveTimer: null,
    };

    // ── API helpers ──────────────────────────────────────────────────

    function api(path, opts = {}) {
      return fetch(BASE + path, { credentials: 'include', ...opts });
    }

    function showError(msg) {
      let el = document.getElementById('error-banner');
      if (!el) {
        el = document.createElement('div');
        el.id = 'error-banner';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 350); }, 5000);
    }

    // ── List ─────────────────────────────────────────────────────────

    async function loadList() {
      try {
        const res = await api('/pdf/list');
        if (res.status === 401) { showError('Não autorizado (401). Verifique o login no painel.'); return; }
        if (!res.ok) { showError('Erro ao carregar lista de PDFs.'); return; }
        S.pdfs = await res.json();
        renderList();
      } catch (e) {
        showError('Falha de rede ao carregar lista.');
      }
    }

    function renderList() {
      const el = document.getElementById('pdf-list');
      if (!S.pdfs.length) {
        el.innerHTML = '<div class="empty-list">Nenhum PDF salvo ainda.</div>';
        return;
      }
      el.innerHTML = S.pdfs.map(pdf => itemHTML(pdf)).join('');
    }

    function itemHTML(pdf) {
      const title = escHtml(pdf.title || pdf.filename);
      const date = pdf.uploaded_at
        ? new Date(pdf.uploaded_at).toLocaleDateString('pt-BR')
        : '';
      const active = pdf.filename === S.filename ? ' active' : '';
      return `
    <div class="pdf-item${active}" id="item-${escId(pdf.filename)}">
      <div class="pdf-item-body" onclick="openPdf('${escAttr(pdf.filename)}', ${pdf.page || 1})">
        <div class="pdf-item-title">${title}</div>
        <div class="pdf-item-meta">
          <span>${date}</span>
          ${pdf.page ? `<span class="page-badge">p. ${pdf.page}</span>` : ''}
        </div>
      </div>
      <div class="pdf-item-actions">
        <button class="item-btn" onclick="startRename('${escAttr(pdf.filename)}')" title="Renomear">✏️ Renomear</button>
        <button class="item-btn del" onclick="deletePdf('${escAttr(pdf.filename)}')" title="Deletar">🗑 Deletar</button>
      </div>
    </div>`;
    }

    // ── Open / Render ─────────────────────────────────────────────────

    async function openPdf(filename, startPage) {
      // Mark active in list
      S.filename = filename;
      document.querySelectorAll('.pdf-item').forEach(el => el.classList.remove('active'));
      const itemEl = document.getElementById('item-' + escId(filename));
      if (itemEl) itemEl.classList.add('active');

      // Show reader skeleton
      document.getElementById('reader-empty').classList.add('hidden');
      document.getElementById('reader-content').classList.remove('hidden');
      document.getElementById('canvas-wrap').classList.add('hidden');
      document.getElementById('canvas-loading').classList.remove('hidden');

      try {
        const res = await api(`/pdf/file/${encodeURIComponent(filename)}`);
        if (res.status === 401) { showError('Não autorizado (401).'); return; }
        if (!res.ok) { showError('Erro ao baixar o PDF.'); return; }
        const arrayBuffer = await res.arrayBuffer();

        if (S.renderTask) {
          try { S.renderTask.cancel(); } catch (_) { }
          S.renderTask = null;
        }

        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        S.doc = await loadingTask.promise;
        S.total = S.doc.numPages;
        S.page = Math.min(Math.max(1, startPage || 1), S.total);

        document.getElementById('canvas-loading').classList.add('hidden');
        document.getElementById('canvas-wrap').classList.remove('hidden');

        await renderPage(S.page);
      } catch (e) {
        showError('Erro ao carregar PDF: ' + e.message);
        document.getElementById('canvas-loading').classList.add('hidden');
      }
    }

    async function renderPage(n) {
      if (!S.doc) return;

      if (S.renderTask) {
        try { S.renderTask.cancel(); } catch (_) { }
        S.renderTask = null;
      }

      S.page = n;

      const page = await S.doc.getPage(n);
      const viewport = page.getViewport({ scale: S.scale });
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const task = page.render({ canvasContext: ctx, viewport });
      S.renderTask = task;

      try {
        await task.promise;
      } catch (e) {
        if (e.name !== 'RenderingCancelledException') throw e;
        return;
      }
      S.renderTask = null;

      updateReaderUI();
      saveProgressDebounced();
    }

    function updateReaderUI() {
      document.getElementById('page-input').value = S.page;
      document.getElementById('page-info').textContent = `de ${S.total}`;
      document.getElementById('btn-prev').disabled = S.page <= 1;
      document.getElementById('btn-next').disabled = S.page >= S.total;
      document.getElementById('zoom-label').textContent = Math.round(S.scale * 100) + '%';
    }

    // ── Navigation ────────────────────────────────────────────────────

    function changePage(delta) {
      const n = S.page + delta;
      if (n < 1 || n > S.total) return;
      renderPage(n);
    }

    function handlePageKey(e) {
      if (e.key === 'Enter') {
        e.target.blur();
      }
    }

    function handlePageBlur() {
      const input = document.getElementById('page-input');
      const n = parseInt(input.value, 10);
      if (!isNaN(n) && n >= 1 && n <= S.total && n !== S.page) {
        renderPage(n);
      } else {
        input.value = S.page;
      }
    }

    // ── Zoom ──────────────────────────────────────────────────────────

    function changeZoom(delta) {
      const next = Math.round((S.scale + delta) * 10) / 10;
      if (next < 0.4 || next > 4.0) return;
      S.scale = next;
      if (S.doc) renderPage(S.page);
    }

    // ── Progress ──────────────────────────────────────────────────────

    function saveProgressDebounced() {
      clearTimeout(S.saveTimer);
      S.saveTimer = setTimeout(async () => {
        if (!S.filename) return;
        try {
          await api(`/pdf/progress/${encodeURIComponent(S.filename)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page: S.page }),
          });
          // Update local state
          const pdf = S.pdfs.find(p => p.filename === S.filename);
          if (pdf) pdf.page = S.page;
        } catch (_) { /* silent */ }
      }, 1000);
    }

    // ── Upload ────────────────────────────────────────────────────────

    function toggleUpload() {
      document.getElementById('upload-zone').classList.toggle('open');
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) uploadFile(file);
      e.target.value = '';
    }

    async function uploadFile(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        showError('Apenas arquivos .pdf são aceitos.');
        return;
      }
      const btn = document.querySelector('.sidebar-header .btn-primary');
      const orig = btn.textContent;
      btn.textContent = 'Enviando…';
      btn.disabled = true;

      try {
        const fd = new FormData();
        fd.append('file', file);
        const res = await api('/pdf/upload', { method: 'POST', body: fd });
        if (res.status === 401) { showError('Não autorizado (401).'); return; }
        if (!res.ok) {
          const txt = await res.text();
          showError('Erro no upload: ' + txt);
          return;
        }
        document.getElementById('upload-zone').classList.remove('open');
        await loadList();
      } catch (e) {
        showError('Falha no upload: ' + e.message);
      } finally {
        btn.textContent = orig;
        btn.disabled = false;
      }
    }

    // Drag-and-drop
    const dropArea = document.getElementById('drop-area');
    dropArea.addEventListener('dragover', e => {
      e.preventDefault();
      dropArea.classList.add('drag-over');
    });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    // ── Rename ────────────────────────────────────────────────────────

    function startRename(filename) {
      const itemEl = document.getElementById('item-' + escId(filename));
      if (!itemEl) return;
      const titleEl = itemEl.querySelector('.pdf-item-title');
      const pdf = S.pdfs.find(p => p.filename === filename);
      const current = pdf ? (pdf.title || pdf.filename) : filename;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'rename-input';
      input.value = current;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;

      async function save() {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (!newTitle || newTitle === current) {
          input.replaceWith(makeTitleSpan(current));
          return;
        }
        try {
          const res = await api(`/pdf/rename/${encodeURIComponent(filename)}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: newTitle }),
          });
          if (res.status === 401) { showError('Não autorizado (401).'); input.replaceWith(makeTitleSpan(current)); return; }
          if (!res.ok) { showError('Erro ao renomear.'); input.replaceWith(makeTitleSpan(current)); return; }
          if (pdf) pdf.title = newTitle;
          input.replaceWith(makeTitleSpan(newTitle));
        } catch (e) {
          showError('Falha ao renomear: ' + e.message);
          input.replaceWith(makeTitleSpan(current));
        }
      }

      function cancel() {
        if (saved) return;
        saved = true;
        input.replaceWith(makeTitleSpan(current));
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { e.preventDefault(); cancel(); }
      });
      input.addEventListener('blur', save);
    }

    function makeTitleSpan(text) {
      const span = document.createElement('div');
      span.className = 'pdf-item-title';
      span.textContent = text;
      return span;
    }

    // ── Delete ────────────────────────────────────────────────────────

    async function deletePdf(filename) {
      const pdf = S.pdfs.find(p => p.filename === filename);
      const label = pdf ? (pdf.title || pdf.filename) : filename;
      if (!confirm(`Deletar "${label}"?`)) return;

      try {
        const res = await api(`/pdf/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        if (res.status === 401) { showError('Não autorizado (401).'); return; }
        if (!res.ok) { showError('Erro ao deletar.'); return; }
        S.pdfs = S.pdfs.filter(p => p.filename !== filename);
        if (S.filename === filename) {
          S.filename = null;
          S.doc = null;
          document.getElementById('reader-content').classList.add('hidden');
          document.getElementById('reader-empty').classList.remove('hidden');
        }
        renderList();
      } catch (e) {
        showError('Falha ao deletar: ' + e.message);
      }
    }

    // ── Utils ─────────────────────────────────────────────────────────

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escAttr(s) {
      return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function escId(s) {
      return String(s).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    // ── Init ──────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', loadList);
  </script>
</body>

</html>
